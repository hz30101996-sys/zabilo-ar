<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>זבילו AR - בדיקת התאמה לבית</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f4; }
        h1 { color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* עיצוב הכפתור שיפתח את המצלמה */
        .ar-button {
            background-color: #ff6600; /* הצבע הכתום של זבילו */
            color: white;
            border: none;
            border-radius: 5px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>הדגמת מציאות רבודה (AR) עבור זבילו</h1>
        <p>בדוק אם המקרר מתאים למטבח שלך לפני הקנייה!</p>

        <model-viewer 
            src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            touch-action="none"
            alt="מודל בדיקה לתצוגה" 
            style="width: 100%; height: 400px; background-color: #eee;">
            
            <button slot="ar-button" class="ar-button">
                📸 לחץ כאן לבדיקה במטבח שלך!
            </button>
        </model-viewer>
    </div>

</body>
</html>
